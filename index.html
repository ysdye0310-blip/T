<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐶 10 만들기 짝꿍수! 🐰</title>
    <!-- 구글 폰트 Jua 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 배경 꾸미기를 위한 둥둥 떠다니는 구름/동물 이모지 -->
    <div class="bg-animals">🐶 ☁️ 🐰 ☁️ 🐱 🌈 🦊</div>
    
    <div class="game-container">
        <header class="game-header">
            <div class="score-board">
                ⭐ 점수: <span id="score">0</span>
            </div>
            <div class="combo-board">
                🔥 연속: <span id="combo">0</span>
            </div>
        </header>

        <main class="game-main">
            <h1 class="title">🌈 짝꿍수 10을 만들어라!</h1>
            
            <form id="game-form" onsubmit="event.preventDefault(); submitAnswer();">
                <div class="question-box">
                    <span id="target-number">?</span> 
                    <span class="plus">➕</span> 
                    <input type="number" id="answer-input" required autocomplete="off" autofocus placeholder="?">
                    <span class="equals">🟰</span> 
                    <span class="ten">10</span>
                </div>
                
                <button type="submit" class="submit-btn" id="submit-btn">확인 🍎</button>
            </form>
        </main>

        <footer class="game-footer">
            <div class="feedback" id="feedback">정답을 적고 확인이나 엔터(Enter)를 누르세요! 🌟</div>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
